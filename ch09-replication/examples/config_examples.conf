# ===== Block 1 =====
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
listen_addresses = '*'

# ===== Block 2 =====
synchronous_commit = on
synchronous_standby_names = 'FIRST 1 (standby1, standby2)'

# ===== Block 3 =====
hot_standby = on
hot_standby_feedback = off

# ===== Block 4 =====
wal_level = logical
max_wal_senders = 10
max_replication_slots = 10
