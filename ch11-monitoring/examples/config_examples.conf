# ===== Block 1 =====
# pg_stat_statements を起動時にロード
shared_preload_libraries = 'pg_stat_statements'

# クエリ ID を計算(pg_stat_statements には auto/on のいずれかが必要)
compute_query_id = auto

# 統計を保持する SQL 文の最大数(LRU で古いものを排出)
pg_stat_statements.max = 5000

# 集計対象: top(トップレベル文のみ)/ all(関数内も)/ none
pg_stat_statements.track = top

# DDL / VACUUM などのユーティリティ文も追跡
pg_stat_statements.track_utility = on

# サーバ停止時に統計をディスクへ保存
pg_stat_statements.save = on
