# ===== Block 1 =====
summarize_wal = on
wal_summary_keep_time = '10d'

# ===== Block 2 =====
wal_level = replica
archive_mode = on
archive_command = 'test ! -f /archive/%f && cp %p /archive/%f'

# ===== Block 3 =====
archive_command = 'aws s3 cp %p s3://my-wal-archive/%f'

# ===== Block 4 =====
archive_command = 'gzip < %p > /archive/%f.gz'

# ===== Block 5 =====
archive_library = 'basic_archive'
basic_archive.archive_directory = '/archive'

# ===== Block 6 =====
restore_command = 'cp /archive/%f %p'
recovery_target_time = '2026-05-10 14:29:00 JST'
recovery_target_action = 'promote'

# ===== Block 7 =====
archive_command = 'pgbackrest --stanza=main archive-push %p'

# ===== Block 8 =====
[global]
repo1-path=/var/lib/pgbackrest
repo1-retention-full=2
repo1-retention-diff=4
process-max=8
compress-type=zstd

[main]
pg1-path=/var/lib/postgresql/18/data
pg1-port=5432

# ===== Block 9 =====
[global]
repo1-type=s3
repo1-s3-bucket=my-pgbackrest-repo
repo1-s3-region=ap-northeast-1
# 実際のキーは絶対にコミットしないこと。環境変数 / IAM Role / Secrets Manager で渡す
repo1-s3-key=<YOUR_AWS_ACCESS_KEY_ID>
repo1-s3-key-secret=<YOUR_AWS_SECRET_ACCESS_KEY>
repo1-s3-endpoint=s3.ap-northeast-1.amazonaws.com

# ===== Block 10 =====
repo1-retention-full=2
repo1-retention-diff=7
repo1-retention-archive=7
